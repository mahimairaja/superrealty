name: Deploy

# Continuous deployment: on merge to main, deploy only the services that changed.
# Frontend -> Vercel, backend + agent -> Railway. Each job no-ops cleanly until its
# secrets are set, so this workflow stays green before the platforms are connected.
on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      frontend: ${{ steps.filter.outputs.frontend }}
      backend: ${{ steps.filter.outputs.backend }}
      agent: ${{ steps.filter.outputs.agent }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            frontend:
              - 'frontend/**'
            backend:
              - 'backend/**'
            agent:
              - 'agent/**'

  deploy-frontend:
    needs: changes
    if: needs.changes.outputs.frontend == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    env:
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Guard on secrets
        id: guard
        run: |
          if [ -z "$VERCEL_TOKEN" ]; then
            echo "VERCEL_TOKEN not set; skipping deploy."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          fi
      - name: Deploy to Vercel
        if: steps.guard.outputs.skip != 'true'
        run: |
          npm i -g vercel@latest
          vercel pull --yes --environment=production --token="$VERCEL_TOKEN"
          vercel build --prod --token="$VERCEL_TOKEN"
          vercel deploy --prebuilt --prod --token="$VERCEL_TOKEN"

  deploy-backend:
    needs: changes
    if: needs.changes.outputs.backend == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    env:
      RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
      SERVICE: ${{ secrets.RAILWAY_BACKEND_SERVICE }}
    steps:
      - uses: actions/checkout@v4
      - name: Guard on secrets
        id: guard
        run: |
          if [ -z "$RAILWAY_TOKEN" ]; then
            echo "RAILWAY_TOKEN not set; skipping deploy."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          fi
      - name: Deploy backend to Railway
        if: steps.guard.outputs.skip != 'true'
        run: |
          npm i -g @railway/cli
          railway up --service "$SERVICE" --detach

  deploy-agent:
    needs: changes
    if: needs.changes.outputs.agent == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: agent
    env:
      RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
      SERVICE: ${{ secrets.RAILWAY_AGENT_SERVICE }}
    steps:
      - uses: actions/checkout@v4
      - name: Guard on secrets
        id: guard
        run: |
          if [ -z "$RAILWAY_TOKEN" ]; then
            echo "RAILWAY_TOKEN not set; skipping deploy."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          fi
      - name: Deploy agent to Railway
        if: steps.guard.outputs.skip != 'true'
        run: |
          npm i -g @railway/cli
          railway up --service "$SERVICE" --detach
